<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>研修スケジュール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 2rem; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
  h3 { font-size: 11px; font-weight: 500; color: #888; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { padding: 9px 10px; text-align: center; border: 0.5px solid rgba(0,0,0,0.1); font-weight: 500; font-size: 11px; white-space: nowrap; color: #555; background: #f9f9f7; }
  th.s1 { background: #E6F1FB; color: #185FA5; }
  th.s2 { background: #EAF3DE; color: #3B6D11; }
  th.s3 { background: #FAEEDA; color: #854F0B; }
  th.s4 { background: #FAECE7; color: #993C1D; }
  th.s5 { background: #EEEDFE; color: #534AB7; }
  th.s6 { background: #FBEAF0; color: #993556; }
  td { padding: 7px 10px; border: 0.5px solid rgba(0,0,0,0.1); text-align: center; vertical-align: middle; }
  td.menu { text-align: left; font-weight: 500; background: #f9f9f7; white-space: nowrap; padding-left: 14px; }
  td.time { color: #888; font-size: 12px; background: #f9f9f7; }
  .cb { display: flex; align-items: center; justify-content: center; }
  input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; border-radius: 4px; flex-shrink: 0; }
  input.b { accent-color: #378ADD; }
  input.g { accent-color: #639922; }
  input.o { accent-color: #BA7517; }
  input.c { accent-color: #D85A30; }
  input.p { accent-color: #7F77DD; }
  input.k { accent-color: #D4537E; }
  input.teal { accent-color: #1D9E75; }
  .progress-bar { height: 6px; background: #eee; border-radius: 3px; margin: 0.4rem 0 1rem; overflow: hidden; }
  .progress-fill { height: 100%; background: #378ADD; border-radius: 3px; transition: width 0.3s; }
  .progress-label { font-size: 12px; color: #888; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .item { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); font-size: 13px; }
  .item:last-child { border-bottom: none; }
  .item input[type=checkbox] { width: 16px; height: 16px; }
</style>
</head>
<body>
<h1>研修スケジュール</h1>

<div class="card">
  <div class="progress-label" id="prog-label">進捗：0 / 42 完了（0%）</div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <table>
    <thead>
      <tr>
        <th style="text-align:left;">メニュー</th>
        <th>時間</th>
        <th class="s1">①手技入れ</th>
        <th class="s2">②手技テスト</th>
        <th class="s3">③技術研修Jr.</th>
        <th class="s4">④技術テストJr.</th>
        <th class="s5">⑤指名6本</th>
        <th class="s6">⑥本デビュー前試験</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr>
        <td class="menu" rowspan="2">ヘッドスパ</td>
        <td class="time">30分</td>
        <td><div class="cb"><input type="checkbox" class="b"></div></td>
        <td><div class="cb"><input type="checkbox" class="g"></div></td>
        <td><div class="cb"><input type="checkbox" class="o"></div></td>
        <td><div class="cb"><input type="checkbox" class="c"></div></td>
        <td><div class="cb"><input type="checkbox" class="p"></div></td>
        <td><div class="cb"><input type="checkbox" class="k"></div></td>
      </tr>
      <tr>
        <td class="time">60分</td>
        <td><div class="cb"><input type="checkbox" class="b"></div></td>
        <td><div class="cb"><input type="checkbox" class="g"></div></td>
        <td><div class="cb"><input type="checkbox" class="o"></div></td>
        <td><div class="cb"><input type="checkbox" class="c"></div></td>
        <td><div class="cb"><input type="checkbox" class="p"></div></td>
        <td><div class="cb"><input type="checkbox" class="k"></div></td>
      </tr>
      <tr>
        <td class="menu" rowspan="2">ボディケア</td>
        <td class="time">60分</td>
        <td><div class="cb"><input type="checkbox" class="b"></div></td>
        <td><div class="cb"><input type="checkbox" class="g"></div></td>
        <td><div class="cb"><input type="checkbox" class="o"></div></td>
        <td><div class="cb"><input type="checkbox" class="c"></div></td>
        <td><div class="cb"><input type="checkbox" class="p"></div></td>
        <td><div class="cb"><input type="checkbox" class="k"></div></td>
      </tr>
      <tr>
        <td class="time">90分</td>
        <td><div class="cb"><input type="checkbox" class="b"></div></td>
        <td><div class="cb"><input type="checkbox" class="g"></div></td>
        <td><div class="cb"><input type="checkbox" class="o"></div></td>
        <td><div class="cb"><input type="checkbox" class="c"></div></td>
        <td><div class="cb"><input type="checkbox" class="p"></div></td>
        <td><div class="cb"><input type="checkbox" class="k"></div></td>
      </tr>
      <tr>
        <td class="menu" rowspan="3">オイル</td>
        <td class="time">60分</td>
        <td><div class="cb"><input type="checkbox" class="b"></div></td>
        <td><div class="cb"><input type="checkbox" class="g"></div></td>
        <td><div class="cb"><input type="checkbox" class="o"></div></td>
        <td><div class="cb"><input type="checkbox" class="c"></div></td>
        <td><div class="cb"><input type="checkbox" class="p"></div></td>
        <td><div class="cb"><input type="checkbox" class="k"></div></td>
      </tr>
      <tr>
        <td class="time">90分</td>
        <td><div class="cb"><input type="checkbox" class="b"></div></td>
        <td><div class="cb"><input type="checkbox" class="g"></div></td>
        <td><div class="cb"><input type="checkbox" class="o"></div></td>
        <td><div class="cb"><input type="checkbox" class="c"></div></td>
        <td><div class="cb"><input type="checkbox" class="p"></div></td>
        <td><div class="cb"><input type="checkbox" class="k"></div></td>
      </tr>
      <tr>
        <td class="time">120分</td>
        <td><div class="cb"><input type="checkbox" class="b"></div></td>
        <td><div class="cb"><input type="checkbox" class="g"></div></td>
        <td><div class="cb"><input type="checkbox" class="o"></div></td>
        <td><div class="cb"><input type="checkbox" class="c"></div></td>
        <td><div class="cb"><input type="checkbox" class="p"></div></td>
        <td><div class="cb"><input type="checkbox" class="k"></div></td>
      </tr>
    </tbody>
  </table>
</div>

<div class="cards">
  <div class="card">
    <h3>説明項目</h3>
    <div class="item"><input type="checkbox" class="teal"><span>ブレンドアロマ</span></div>
    <div class="item"><input type="checkbox" class="teal"><span>症状別施術可否</span></div>
    <div class="item"><input type="checkbox" class="teal"><span>電話対応</span></div>
    <div class="item"><input type="checkbox" class="teal"><span>英語対応</span></div>
    <div class="item"><input type="checkbox" class="teal"><span>頻出筋肉</span></div>
    <div class="item"><input type="checkbox" class="teal"><span>リンパ系</span></div>
  </div>
  <div class="card">
    <h3>テスト項目</h3>
    <div class="item"><input type="checkbox"><span>100問（ヘッド）</span></div>
    <div class="item"><input type="checkbox"><span>100問（縦）</span></div>
    <div class="item"><input type="checkbox"><span>100問（横）</span></div>
    <div class="item"><input type="checkbox"><span>筋肉位置テスト</span></div>
    <div class="item"><input type="checkbox"><span>ヘッド小テスト</span></div>
  </div>
</div>

<script>
  const total = 42;
  function update() {
    const checked = document.querySelectorAll('#tbody input:checked').length;
    const pct = Math.round(checked / total * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-label').textContent = '進捗：' + checked + ' / ' + total + ' 完了（' + pct + '%）';
  }
  document.querySelectorAll('#tbody input').forEach(cb => cb.addEventListener('change', update));
</script>
</body>
</html>
